# Photon F-Stack example config — minimal, AWS-ENA oriented.
#
# This is a trimmed, annotated starting point for examples/wss_market_data on an
# AWS instance whose trading NIC (an ENA ENI) is bound to a DPDK driver. See
# docs/fstack_bringup.md for how to derive the [port0] fields from IMDS and for
# the ENI public-egress requirement.
#
# The [port0] values below are from the reference bring-up box (subnet
# 10.20.88.128/25, DPDK ENI at 10.20.88.195). REPLACE them with YOUR ENI's real
# values — placeholders like 192.168.x are silently dropped by the AWS fabric.

[dpdk]
# Hex bitmask of cores F-Stack runs on. One core is fine for a few sessions.
lcore_mask=1
channel=4
promiscuous=1
numa_on=1
tso=0
vlan_strip=1
# One DPDK port (the bound ENI). Its config is [port0] below.
port_list=0
nb_vdev=0
nb_bond=0
# Send immediately; do not batch-delay (latency over throughput).
pkt_tx_delay=0
# Busy-poll: do not sleep when idle (we want lowest latency, one core dedicated).
idle_sleep=0

[pcap]
enable=0

[stack]
# Pure F-Stack (every socket uses the userspace stack). The management NIC
# (ens5) stays on the kernel independently; it is not a DPDK port here.
kernel_coexist=0

# ── DPDK port 0 = the trading ENI ────────────────────────────────────────────
# Derive these from IMDS for the DPDK ENI's MAC (the one NOT shown by `ip addr`):
#   local-ipv4s            -> addr
#   subnet-ipv4-cidr-block -> netmask (from prefix) + broadcast (subnet's last)
#   gateway                -> subnet network address + 1 (AWS convention)
[port0]
addr=10.20.88.195
netmask=255.255.255.128
broadcast=10.20.88.255
gateway=10.20.88.129
if_name=ens6

# FreeBSD stack tuning (sane defaults; matches the stock F-Stack config).
[freebsd.boot]
hz=100
fd_reserve=1024
kern.ipc.maxsockets=262144
net.inet.tcp.syncache.hashsize=4096
net.inet.tcp.syncache.bucketlimit=100
net.inet.tcp.tcbhashsize=65536
kern.ncallout=262144
kern.features.inet6=1

[freebsd.sysctl]
kern.ipc.somaxconn=32768
kern.ipc.maxsockbuf=16777216
net.inet.tcp.sendspace=16384
net.inet.tcp.recvspace=8192
net.inet.tcp.cc.algorithm=cubic
net.inet.tcp.sendbuf_max=16777216
net.inet.tcp.recvbuf_max=16777216
net.inet.tcp.sendbuf_auto=1
net.inet.tcp.recvbuf_auto=1
net.inet.tcp.sack.enable=1
net.inet.tcp.delayed_ack=1
net.inet.tcp.rfc1323=1
net.inet.ip.redirect=0
net.inet.ip.forwarding=0
net.inet.tcp.functions_default=freebsd